<!DOCTYPE html>
<html>
<head>
  <title>🔥 AI Fire Detection + Map</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
    }

    video {
      width: 100%;
      max-height: 50vh;
    }

    #map {
      width: 100%;
      height: 40vh;
      border: none;
    }

    button {
      padding: 10px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      font-size: 16px;
    }

    #status {
      margin: 10px;
    }
  </style>
</head>

<body>

<h2>🔥 AI FIRE DETECTION SYSTEM</h2>

<video id="video" autoplay playsinline></video>

<div id="status">🟢 System Ready</div>

<button onclick="getLocation()">📍 Get Location</button>
<button onclick="manualFire()">🔥 Test Fire</button>

<a href="history.html">
  <button>📊 Fire History</button>
</a>

<iframe id="map"></iframe>

<!-- 🔔 NOTIFICATION PERMISSION -->
<script>
if ("Notification" in window) {
  Notification.requestPermission();
}
</script>

<!-- 🔐 LOGIN PROTECTION -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "fire-sysem.firebaseapp.com",
  projectId: "fire-sysem"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    location.href = "login.html";
  }
});
</script>

<!-- 🔥 MAIN SCRIPT -->
<script>
const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const map = document.getElementById("map");

let lat = 0;
let lng = 0;
let sending = false;

// 📷 CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  statusBox.innerText = "❌ Camera Error: " + err;
});

// 📍 AUTO LOAD LOCATION
window.onload = () => {
  getLocation();
};

// 📍 LOCATION
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      statusBox.innerText = `📍 ${lat}, ${lng}`;

      map.src =
        `https://maps.google.com/maps?q=${lat},${lng}&output=embed`;
    });
  }
}

// 🤖 AI FIRE DETECTION
function detectFire(){
  if(!video.videoWidth) return false;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  let firePixels = 0;

  for(let i = 0; i < data.length; i += 4){
    let r = data[i];
    let g = data[i+1];
    let b = data[i+2];

    if(r > 200 && g > 100 && b < 80){
      firePixels++;
    }
  }

  const percent = firePixels / (data.length / 4);
  return percent > 0.05;
}

// 🤖 AUTO DETECTION LOOP
setInterval(()=>{
  if(detectFire()){
    sendFire("AI");
  }
}, 3000);

// 🔥 SEND ALERT
async function sendFire(type){

  if(sending) return;

  if(lat === 0 || lng === 0){
    alert("⚠️ Please get location first!");
    return;
  }

  sending = true;
  statusBox.innerText = "⏳ Sending alert...";
  statusBox.style.color = "orange";

  try {
    await fetch("https://fire-sysem-1.onrender.com/send-sms", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ lat, lng, type })
    });

    // 🔔 NOTIFICATION
    if (Notification.permission === "granted") {
      new Notification("🔥 FIRE ALERT!", {
        body: "Location: " + lat + ", " + lng
      });
    }

    alert("🔥 FIRE ALERT SENT!");
    statusBox.innerText = "🚨 Alert Sent";
    statusBox.style.color = "red";

  } catch (err) {
    alert("❌ Server Error!");
    console.error(err);
  }

  sending = false;
}

// 🧪 MANUAL
function manualFire(){
  sendFire("MANUAL");
}

// 📱 SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("✅ SW Registered"))
    .catch(err => console.log("❌ SW Error", err));
}
</script>

<!-- 🤖 AI LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

</body>
</html>
