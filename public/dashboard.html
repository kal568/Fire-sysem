<!DOCTYPE html>
<html>
<head>
  <title>🔥 AI Fire Detection + Map</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
    }

    video {
      width: 100%;
      max-height: 50vh;
    }

    #map {
      width: 100%;
      height: 40vh;
      border: none;
    }

    button {
      padding: 10px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      font-size: 16px;
    }

    #status {
      margin: 10px;
    }
  </style>
</head>

<body>

<h2>🔥 AI FIRE DETECTION SYSTEM</h2>

<video id="video" autoplay playsinline></video>

<div id="status">🟢 System Ready</div>

<button onclick="getLocation()">📍 Get Location</button>
<button onclick="manualFire()">🔥 Test Fire</button>

<!-- 🗺️ SATELLITE MAP -->
<iframe id="map"></iframe>

<script>
const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const map = document.getElementById("map");

let lat = 0;
let lng = 0;

// 📷 CAMERA START
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  statusBox.innerText = "❌ Camera Error: " + err.message;
});

// 📍 GET LOCATION
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      statusBox.innerText = `📍 Location: ${lat}, ${lng}`;

      // 🗺️ SATELLITE MAP
      map.src =
        `https://maps.google.com/maps?q=${lat},${lng}&t=k&z=18&output=embed`;
    });
  } else {
    alert("Geolocation not supported");
  }
}

// 🤖 FAKE AI DETECTION
setInterval(()=>{
  if(Math.random() < 0.05){
    sendFire("AUTO");
  }
}, 5000);

// 🔥 FIRE ALERT
async function sendFire(type){
  statusBox.innerText = "🔥 FIRE DETECTED (" + type + ")";

  await fetch("https://fire-sysem-1.onrender.com/send-sms", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      lat: lat,
      lng: lng,
      source: "camera",
      type: type
    })
  });

  alert("🔥 FIRE ALERT SENT!");
  statusBox.innerText = "🚨 Alert Sent";
}

// 🧪 MANUAL TEST
function manualFire(){
  sendFire("MANUAL");
}
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

</body>
</html>
