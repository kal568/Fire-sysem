<!DOCTYPE html>
<html>
<head>
  <title>Fire Alert</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;">

<h2>🔥 Fire Alert System (Firebase Live)</h2>

<button onclick="getLocation()">📍 Get Location</button>
<button onclick="sendFire()">🔥 SEND FIRE</button>

<p id="status"></p>

<iframe id="map" width="100%" height="400"></iframe>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "fire-sysem.firebaseapp.com",
  projectId: "fire-sysem"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📍 LOCATION
let lat = null;
let lng = null;

window.getLocation = function(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      document.getElementById("status").innerText =
        "📍 " + lat + ", " + lng;
    });
  } else {
    alert("Geolocation not supported");
  }
}

// 🔥 SEND ALERT
window.sendFire = async function(){
  if(lat === null || lng === null){
    alert("⚠️ Get location first!");
    return;
  }

  // save to firebase
  await addDoc(collection(db,"alerts"),{
    lat: lat,
    lng: lng,
    time: new Date()
  });

  // 🔥 SEND TO BACKEND (Render)
  await fetch("https://fire-sysem-1.onrender.com/send-sms", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ lat, lng })
  });

  alert("🔥 Fire Alert Sent!");
}

// 🗺️ LIVE MAP
onSnapshot(collection(db,"alerts"), snap=>{
  let markers = "";
  let center = "0,0";

  snap.forEach(doc=>{
    let d = doc.data();

    if(d.lat && d.lng){
      markers += `&markers=color:red%7C${d.lat},${d.lng}`;
      center = `${d.lat},${d.lng}`;
    }
  });

  document.getElementById("map").src =
    `https://maps.google.com/maps?q=${center}&output=embed${markers}`;
});
</script>

</body>
</html>
