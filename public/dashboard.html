<!DOCTYPE html>
<html>
<head>
  <title>🔥 AI Fire Detection</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
      margin: 0;
    }

    h2 {
      margin: 15px;
    }

    video {
      width: 100%;
      max-height: 70vh;
      background: #000;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
    }

    button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: red;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>🔥 AI FIRE DETECTION CAMERA</h2>

<video id="video" autoplay playsinline></video>

<div id="status">🟢 System Ready</div>

<button onclick="manualTest()">🔥 Test Fire Alert</button>

<script>
const video = document.getElementById("video");
const statusBox = document.getElementById("status");

// 📷 OPEN CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  statusBox.innerText = "❌ Camera Error: " + err.message;
});

// 🤖 SIMPLE AI DETECTION (demo simulation)
let detectionActive = true;

setInterval(() => {
  if(!detectionActive) return;

  // 🔥 fake AI detection trigger
  if(Math.random() < 0.05){   // 5% chance every 5 sec
    sendFire("AUTO");
  }
}, 5000);

// 🔥 SEND FIRE ALERT
async function sendFire(type){
  try {
    statusBox.innerText = "🔥 FIRE DETECTED (" + type + ")";

    await fetch("https://fire-sysem-1.onrender.com/send-sms", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        lat: 0,
        lng: 0,
        source: "camera",
        type: type || "AUTO"
      })
    });

    alert("🔥 FIRE ALERT SENT!");

    statusBox.innerText = "🚨 Alert Sent Successfully";
  }
  catch (err) {
    statusBox.innerText = "❌ Error sending alert";
  }
}

// 🧪 MANUAL TEST BUTTON
function manualTest(){
  sendFire("MANUAL");
}
</script>

</body>
</html>
